<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Order Now</h2>

  <p id="selected-product">Selected Product: </p>

  <form>
    <label for="name">Name:</label>
    <input type="text" id="name" required>

    <label for="number">Phone Number:</label>
    <input type="text" id="number" required>

    <label for="address">Address:</label>
    <input type="text" id="address" required>

    <button type="submit">Place Order</button>
  </form>

  <script>
    // Form e selected product show korbe
    const productName = localStorage.getItem("selectedProduct");
    document.getElementById("selected-product").textContent = "Selected Product: " + productName;
  </script>
</body>
</html>
